<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter | iitomo's Tools</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="background-decor blob-1"></div>
    <div class="background-decor blob-2"></div>

    <a href="#" onclick="if(window.parent !== window){ window.parent.postMessage('goHome', '*'); } else { window.location.href='../index.html'; } return false;" class="back-link"><i class="fa-solid fa-arrow-left"></i> ダッシュボードへ戻る</a>

    <div class="container">
        <header>
            <h1>Image Converter</h1>
            <p class="subtitle" id="main-subtitle">ドラッグ＆ドロップで画像フォーマットを瞬時に変換</p>
        </header>

        <main>
            <!-- Tab Bar -->
            <div class="tab-bar">
                <button class="tab-btn active" id="tab-image"><i class="fa-solid fa-image"></i> 画像変換</button>
                <button class="tab-btn" id="tab-pdf"><i class="fa-solid fa-file-pdf"></i> PDF変換</button>
            </div>

            <!-- ========== IMAGE SECTION ========== -->
            <div id="image-section">
                <!-- Drop Zone -->
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-zone-content">
                        <div class="drop-icon">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                        </div>
                        <p class="drop-text">画像をドラッグ＆ドロップ</p>
                        <p class="drop-subtext">または</p>
                        <label class="file-select-btn" for="file-input">
                            <i class="fa-solid fa-folder-open"></i> ファイルを選択
                        </label>
                        <input type="file" id="file-input" accept="image/*" multiple hidden>
                        <p class="supported-formats">対応: JPEG / PNG / WebP / BMP / GIF</p>
                    </div>
                </div>

                <!-- Conversion Settings -->
                <div class="settings-panel" id="settings-panel">
                    <div class="settings-row">
                        <div class="setting-group">
                            <label class="setting-label">出力フォーマット</label>
                            <div class="format-selector">
                                <button class="format-btn active" data-format="image/jpeg" data-ext="jpg">JPEG</button>
                                <button class="format-btn" data-format="image/png" data-ext="png">PNG</button>
                                <button class="format-btn" data-format="image/webp" data-ext="webp">WebP</button>
                            </div>
                        </div>
                        <div class="setting-group" id="quality-group">
                            <label class="setting-label">品質: <span id="quality-value">90</span>%</label>
                            <input type="range" id="quality-slider" min="10" max="100" value="90" class="quality-slider">
                        </div>
                    </div>
                </div>

                <!-- File List -->
                <div class="file-list" id="file-list"></div>

                <!-- Action Buttons -->
                <div class="action-bar" id="action-bar">
                    <button class="primary-btn" id="convert-all-btn">
                        <i class="fa-solid fa-arrows-rotate"></i> すべて変換
                    </button>
                    <button class="secondary-btn" id="download-all-btn" style="display: none;">
                        <i class="fa-solid fa-download"></i> すべてダウンロード
                    </button>
                    <button class="clear-btn" id="clear-all-btn">
                        <i class="fa-solid fa-trash-can"></i> クリア
                    </button>
                </div>
            </div><!-- /#image-section -->

            <!-- ========== PDF SECTION ========== -->
            <div id="pdf-section" style="display:none">
                <!-- PDF Drop Zone -->
                <div class="drop-zone" id="pdf-drop-zone">
                    <div class="drop-zone-content">
                        <div class="drop-icon" style="color:#ef4444;">
                            <i class="fa-solid fa-file-pdf"></i>
                        </div>
                        <p class="drop-text">PDFをドラッグ＆ドロップ</p>
                        <p class="drop-subtext">または</p>
                        <label class="file-select-btn" for="pdf-file-input">
                            <i class="fa-solid fa-folder-open"></i> ファイルを選択
                        </label>
                        <input type="file" id="pdf-file-input" accept=".pdf,application/pdf" hidden>
                        <p class="supported-formats" id="pdf-limit-text">PC: 最大50MB・20ページ</p>
                    </div>
                </div>

                <!-- PDF Settings Panel -->
                <div class="settings-panel" id="pdf-settings-panel">
                    <!-- PDF File Info -->
                    <div class="pdf-file-info">
                        <i class="fa-solid fa-file-pdf" style="color:#ef4444;"></i>
                        <span id="pdf-file-name" class="pdf-file-name-text">ファイル名.pdf</span>
                        <span id="pdf-page-count" class="pdf-page-badge">0ページ</span>
                    </div>

                    <!-- Page Selection Mode -->
                    <div class="setting-group" style="margin-top:1.2rem;">
                        <label class="setting-label">ページ選択</label>
                        <div class="format-selector" id="page-mode-selector">
                            <button class="format-btn active" data-mode="all">全ページ</button>
                            <button class="format-btn" data-mode="range">範囲指定</button>
                            <button class="format-btn" data-mode="custom">個別指定</button>
                        </div>
                        <div id="page-range-input" class="page-input-row" style="display:none;">
                            <input type="number" id="range-start" class="page-number-input" min="1" placeholder="開始ページ">
                            <span class="page-input-sep">〜</span>
                            <input type="number" id="range-end" class="page-number-input" min="1" placeholder="終了ページ">
                        </div>
                        <div id="page-custom-input" style="display:none; margin-top:0.8rem;">
                            <input type="text" id="custom-pages" class="page-text-input" placeholder="例: 1, 3, 5">
                        </div>
                    </div>

                    <!-- Output Format & Quality -->
                    <div class="settings-row" style="margin-top:1.2rem;">
                        <div class="setting-group">
                            <label class="setting-label">出力フォーマット</label>
                            <div class="format-selector" id="pdf-format-selector">
                                <button class="format-btn active" data-pdf-format="png">PNG</button>
                                <button class="format-btn" data-pdf-format="jpeg">JPEG</button>
                            </div>
                        </div>
                        <div class="setting-group" id="pdf-quality-group" style="opacity:0.3; pointer-events:none;">
                            <label class="setting-label">品質: <span id="pdf-quality-value">90</span>%</label>
                            <input type="range" id="pdf-quality-slider" min="10" max="100" value="90" class="quality-slider">
                        </div>
                    </div>
                </div>

                <!-- PDF Progress -->
                <div id="pdf-progress" style="display:none; margin-top:1.5rem;">
                    <div class="progress-bar-wrap">
                        <div class="progress-bar-track">
                            <div class="progress-bar-fill" id="pdf-progress-bar"></div>
                        </div>
                        <p id="pdf-progress-text" class="progress-text">変換中... 0 / 0 ページ</p>
                    </div>
                </div>

                <!-- PDF Action Buttons -->
                <div class="action-bar" id="pdf-action-bar">
                    <button class="primary-btn" id="pdf-convert-btn">
                        <i class="fa-solid fa-arrows-rotate"></i> 変換＆ダウンロード
                    </button>
                    <button class="clear-btn" id="pdf-clear-btn">
                        <i class="fa-solid fa-trash-can"></i> クリア
                    </button>
                </div>
            </div><!-- /#pdf-section -->
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; 2026 iitomo's Tools</p>
                <div class="version">v1.1.0</div>
            </div>
        </footer>
    </div>

    <div id="toast" class="toast">変換完了！</div>

    <script src="script.js"></script>
    <script>
        // ポータルとの連携（コンテナ高さを基準にして無限ループを完全防止）
        let lastHeight = 0;
        const sendHeight = () => {
            const container = document.querySelector('.container');
            if (container && window.parent !== window) {
                const h = container.offsetHeight + 100;
                if (Math.abs(lastHeight - h) > 5) {
                    lastHeight = h;
                    window.parent.postMessage({ type: 'resize', height: h }, '*');
                }
            }
        };
        window.addEventListener('load', sendHeight);

        setTimeout(() => {
            const target = document.querySelector('.container');
            if(target) {
                new ResizeObserver(sendHeight).observe(target);
                const observer = new MutationObserver(sendHeight);
                observer.observe(target, { childList: true, subtree: true, characterData: true });
            }
        }, 100);
    </script>
</body>
</html>
