<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>らくらくボイスメモ</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --primary-blue: #005bac;
            --accent-red: #d7000f;
            --accent-green: #008931;
            --gray-light: #f4f4f4;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-weight: bold;
        }

        /* ヘッダー */
        header {
            background-color: var(--gray-light);
            padding: 15px;
            border-bottom: 4px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 24px;
        }

        .back-btn {
            background-color: #666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        /* メイン：文字表示エリア */
        main {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #memo-display {
            font-size: 40px; /* 超巨大 */
            line-height: 1.5;
            word-break: break-all;
            white-space: pre-wrap;
            min-height: 100px;
        }

        .placeholder {
            color: #999;
            font-size: 32px;
        }

        /* フッター：巨大ボタン */
        footer {
            padding: 20px;
            border-top: 4px solid var(--border-color);
            background-color: var(--gray-light);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .main-btn {
            width: 100%;
            height: 140px; /* 巨大 */
            border: none;
            border-radius: 20px;
            font-size: 48px;
            font-weight: 900;
            color: white;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .main-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        /* 待機中：お話しする */
        .btn-start {
            background-color: var(--accent-green);
        }

        /* 録音中：おわり */
        .btn-stop {
            background-color: var(--accent-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .secondary-actions {
            display: flex;
            gap: 15px;
        }

        .sub-btn {
            flex: 1;
            height: 80px;
            border: 3px solid var(--border-color);
            background-color: white;
            font-size: 28px;
            border-radius: 15px;
            cursor: pointer;
        }

        .btn-clear {
            color: var(--accent-red);
        }

        /* ステータス表示 */
        #status-bar {
            background-color: #333;
            color: #fff;
            padding: 5px 20px;
            font-size: 16px;
            text-align: center;
        }

        /* 非表示 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">らくらくボイスメモ</div>
    </header>

    <div id="status-bar" class="hidden">聞きとり中...</div>

    <main id="scroll-area">
        <div id="memo-display"><span class="placeholder">下のボタンを押してから<br>お話しください。</span></div>
    </main>

    <footer>
        <button id="toggle-btn" class="main-btn btn-start">お話しする</button>
        <div class="secondary-actions">
            <button id="clear-btn" class="sub-btn btn-clear">ぜんぶ消す</button>
        </div>
    </footer>

    <script>
        const memoDisplay = document.getElementById('memo-display');
        const toggleBtn = document.getElementById('toggle-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusBar = document.getElementById('status-bar');
        const scrollArea = document.getElementById('scroll-area');

        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';

        // 初期読み込み：保存されたメモを復元
        window.onload = () => {
            const saved = localStorage.getItem('raku_raku_memo');
            if (saved) {
                finalTranscript = saved;
                memoDisplay.innerText = finalTranscript;
            }
        };

        // Web Speech API の初期化
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            memoDisplay.innerHTML = '<span style="color:red">申し訳ありません。このスマホでは音声入力が使えません。Google Chromeなどをお使いください。</span>';
            toggleBtn.disabled = true;
            toggleBtn.style.opacity = '0.5';
        } else {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.interimResults = true; // 途中経過を表示
            recognition.continuous = true;    // ずっと聞き続ける

            recognition.onstart = () => {
                isRecording = true;
                updateUI();
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                // 表示の更新
                memoDisplay.innerText = finalTranscript + interimTranscript;
                
                // 自動スクロール
                scrollArea.scrollTop = scrollArea.scrollHeight;

                // 保存
                localStorage.setItem('raku_raku_memo', finalTranscript);
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (event.error === 'not-allowed') {
                    alert('マイクの使用が許可されていません。設定を確認してください。');
                }
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    // 意図せぬ終了（無音など）の場合は再開を試みる
                    recognition.start();
                } else {
                    updateUI();
                }
            };
        }

        function startRecording() {
            if (!recognition) return;
            try {
                recognition.start();
            } catch (e) {
                console.error(e);
            }
        }

        function stopRecording() {
            isRecording = false;
            if (recognition) {
                recognition.stop();
            }
            updateUI();
        }

        function updateUI() {
            if (isRecording) {
                toggleBtn.innerText = 'おわり';
                toggleBtn.className = 'main-btn btn-stop';
                statusBar.classList.remove('hidden');
            } else {
                toggleBtn.innerText = 'お話しする';
                toggleBtn.className = 'main-btn btn-start';
                statusBar.classList.add('hidden');
                
                if (!finalTranscript) {
                    memoDisplay.innerHTML = '<span class="placeholder">下のボタンを押してから<br>お話しください。</span>';
                }
            }
        }

        toggleBtn.onclick = () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        };

        clearBtn.onclick = () => {
            if (confirm('書いた内容を全部消してもよろしいですか？')) {
                finalTranscript = '';
                localStorage.removeItem('raku_raku_memo');
                memoDisplay.innerHTML = '<span class="placeholder">下のボタンを押してから<br>お話しください。</span>';
                if (isRecording) stopRecording();
            }
        };
    </script>
</body>
</html>
