<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator | iitomo's Tools</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-decor blob-1"></div>
    <div class="background-decor blob-2"></div>

    <a href="#" onclick="if(window.parent !== window){ window.parent.postMessage('goHome', '*'); } else { window.location.href='../index.html'; } return false;" class="back-link"><i class="fa-solid fa-arrow-left"></i> ダッシュボードへ戻る</a>

    <div class="container">
        <header>
            <h1>Translator</h1>
            <div id="line-browser-banner" class="line-banner" style="display: none;">
                <p><i class="fab fa-line"></i> LINE内蔵ブラウザでは一部機能が制限されます。</p>
                <button id="open-external-btn">外部ブラウザで開く</button>
            </div>
        </header>

        <main>
            <div class="translator-card">
                <div class="lang-controls">
                    <div class="lang-box active" data-lang="ja">Japanese</div>
                    <button id="swap-langs" class="swap-btn" title="Swap Languages">
                        <i class="fas fa-exchange-alt"></i>
                    </button>
                    <div class="lang-box" data-lang="en">English</div>
                </div>

                <div class="input-section">
                    <div class="textarea-wrapper">
                        <textarea id="source-text" placeholder="翻訳したいテキストを入力..." spellcheck="false"></textarea>
                        <div class="textarea-footer">
                            <span id="char-count">0 / 5000</span>
                            <button id="clear-btn" class="icon-btn" title="Clear">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="action-section" style="margin-bottom: 1rem; justify-content: center; display: flex;">
                    <div id="status-indicator" class="status-indicator">
                        <i class="fas fa-magic"></i> Auto-translating...
                    </div>
                </div>

                <div class="output-grid">
                    <div class="output-column">
                        <label class="output-label">ENGLISH</label>
                        <div class="textarea-wrapper result-wrapper">
                            <textarea id="english-result" placeholder="English result..." spellcheck="false" class="empty" readonly></textarea>
                            <div class="textarea-footer">
                                <button id="copy-en-btn" class="icon-btn" title="Copy English">
                                    <i class="far fa-copy"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="output-column">
                        <label class="output-label">JAPANESE (Edit to refine)</label>
                        <div class="textarea-wrapper result-wrapper">
                            <textarea id="japanese-result" placeholder="日本語結果..." spellcheck="false" class="empty"></textarea>
                            <div class="textarea-footer">
                                <button id="update-original-btn" class="secondary-action-btn" title="Refine based on this Japanese">
                                    <i class="fas fa-sync-alt"></i> 更新
                                </button>
                                <button id="copy-ja-btn" class="icon-btn" title="Copy Japanese">
                                    <i class="far fa-copy"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; 2026 iitomo's Tools</p>
                <div class="version">v2.1.0</div>
            </div>
        </footer>
    </div>

    <div id="toast" class="toast">コピーしました！</div>

    <script src="script.js"></script>
    <script>
        // ポータルとの連携（コンテナ高さを基準にして無限ループを完全防止）
        let lastHeight = 0;
        const sendHeight = () => {
            const container = document.querySelector('.container');
            if (container && window.parent !== window) {
                const h = container.offsetHeight + 100; 
                if (Math.abs(lastHeight - h) > 5) {
                    lastHeight = h;
                    window.parent.postMessage({ type: 'resize', height: h }, '*');
                }
            }
        };
        window.addEventListener('load', sendHeight);
        
        setTimeout(() => {
            const target = document.querySelector('.container');
            if(target) {
                new ResizeObserver(sendHeight).observe(target);
                const observer = new MutationObserver(sendHeight);
                observer.observe(target, { childList: true, subtree: true, characterData: true });
            }
        }, 100);
    </script>
</body>
</html>
