<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="popup.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23238636%22/><path d=%22M25 25h20v20H25zM55 25h20v20H55zM25 55h20v20H25zM65 55h10v10H65zM55 65h10v10H55z%22 fill=%22white%22/></svg>">
    <title>QR Generator | Premium</title>
    <style>body { padding-top: 20px !important; }</style>
</head>

<body>
    <div class="background-decor blob-1"></div>
    <div class="background-decor blob-2"></div>
    <a href="#" onclick="if(window.parent !== window){ window.parent.postMessage('goHome', '*'); } else { window.location.href='../index.html'; } return false;" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> ダッシュボードへ戻る
    </a>

    <div class="container">
        <header>
            <div class="header-top">
                <h1>QR Tool</h1>
                <button id="settings-btn" class="icon-btn" title="Settings">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>

            <nav class="tabs">
                <button class="tab-btn active" data-tab="generator">
                    <i class="fa-solid fa-qrcode"></i> Generate
                </button>
                <button class="tab-btn" data-tab="reader">
                    <i class="fa-solid fa-camera"></i> Read
                </button>
            </nav>
        </header>

        <main>
            <div id="line-browser-banner" class="line-banner" style="display: none;">
                <p><i class="fa-brands fa-line"></i> LINE内蔵ブラウザでは一部機能が制限されます。</p>
                <button id="open-external-btn">外部ブラウザで開く</button>
            </div>

            <!-- Generator Tab Content -->
            <div id="generator-tab" class="tab-content active">
                <div class="qr-container">
                    <canvas id="qr"></canvas>
                </div>
                <div class="option-group" style="flex-direction: column; gap: 10px;">
                    <label class="checkbox-container">
                        <input type="checkbox" id="external-browser-option">
                        <span class="checkmark"></span>
                        外部ブラウザで開く
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="enable-short-url-option">
                        <span class="checkmark"></span>
                        短縮URLを作成する
                    </label>
                    <p class="option-hint"><i class="fa-solid fa-circle-info"></i> Instagram等では短縮URLを使わない方が安全です</p>
                </div>
                <div class="input-group">
                    <input type="text" id="text-input" placeholder="Type something or use current URL..."
                        spellcheck="false">
                    <div class="action-buttons">
                        <button id="copy-btn" title="Copy QR Code Image">Copy Image</button>
                        <button id="download-btn" title="Download QR Code Image">Download Image</button>
                    </div>
                </div>
                <div class="short-url-container" id="short-url-container" style="display: none;">
                    <div class="short-url-container-inner">
                        <input type="text" id="short-url-input" readonly title="Short URL">
                        <button id="copy-url-btn" title="Copy Short URL">Copy URL</button>
                    </div>
                </div>
            </div>

            <!-- Reader Tab Content -->
            <div id="reader-tab" class="tab-content">
                <div class="reader-actions" style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                    <button id="start-camera-btn" class="secondary-btn">
                        <i class="fa-solid fa-camera"></i> Scan with Camera
                    </button>
                    <p class="option-hint" style="color: var(--primary); font-size: 0.9rem; margin: 0; font-weight: 500;">
                        <i class="fa-solid fa-bolt"></i> QRコードの内容がURLの場合、自動的に別タブで開きます！
                    </p>
                </div>

                <div id="camera-container" class="camera-container" style="display: none;">
                    <video id="camera-preview" playsinline></video>
                    <div class="scan-overlay">
                        <div class="scan-line"></div>
                        <div class="corner top-left"></div>
                        <div class="corner top-right"></div>
                        <div class="corner bottom-left"></div>
                        <div class="corner bottom-right"></div>
                    </div>
                </div>

                <div class="upload-container" id="drop-zone">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p>枠内をタップして写真を選択<br>または画像をドラッグ＆ドロップ</p>
                    <input type="file" id="file-input" accept="image/*" hidden>
                </div>
                <div id="reader-result-container" class="result-container" style="display: none;">
                    <h3>Decoded Content:</h3>
                    <div class="result-box">
                        <textarea id="reader-result" readonly></textarea>
                        <div class="result-actions" style="display: flex; gap: 10px;">
                            <button id="copy-reader-result-btn" class="secondary-btn">Copy Link</button>
                            <button id="open-link-btn" class="primary-btn" style="display: none;">
                                <i class="fa-solid fa-up-right-from-square"></i> Open Link
                            </button>
                        </div>
                    </div>
                    <p class="option-hint" style="margin-top: 10px; color: #8b949e; font-size: 0.85rem;"><i class="fa-solid fa-circle-info"></i> LINEの友だち追加など、スマホアプリ専用のQRコードはPCブラウザでは開けないこと（何も起きないこと）があります。</p>
                </div>
                <!-- Reader Short URL Section -->
                <div class="short-url-container" id="reader-short-url-container" style="display: none;">
                    <div class="short-url-container-inner">
                        <input type="text" id="reader-short-url-input" readonly title="Short URL">
                        <button id="reader-copy-url-btn" title="Copy Short URL">Copy URL</button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <div class="status-container">
                <div class="status" id="status-text">Ready</div>
                <div class="version">v2.1.0</div>
            </div>
        </footer>
    </div>
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label for="bitly-api-key" style="font-size: 1rem; color: var(--neon-cyan); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px;">
                        <i class="fa-solid fa-key"></i> Bitly アクセストークン
                    </label>
                    <p class="setting-hint" style="margin-bottom: 1rem; line-height: 1.5;">
                        Bitlyのトークンを設定すると、高品質な短縮URLを自動生成できます。
                    </p>
                    <input type="password" id="bitly-api-key" placeholder="ここにトークンを貼り付け..." style="margin-bottom: 0;">
                    <div style="text-align: right;">
                        <button id="clear-api-key-btn" class="clear-text-btn">入力をクリアする</button>
                    </div>
                </div>
                <div style="margin-top: 2rem;">
                    <button id="save-settings-btn" class="primary-btn" style="padding: 1.2rem; font-size: 1.1rem; letter-spacing: 0.05em;">
                        設定を保存する
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="lib/qrious.min.js"></script>
    <script src="lib/jsQR.min.js"></script>
    <script src="popup.js"></script>
    <script>
        // ポータルとの連携（コンテナ高さを基準にして無限ループを完全防止）
        let lastHeight = 0;
        const sendHeight = () => {
            const container = document.querySelector('.container');
            if (container && window.parent !== window) {
                // コンテナの高さ + 余白を加算（bodyの100vhやalign-itemsの影響を排除）
                const h = container.offsetHeight + 100; 
                if (Math.abs(lastHeight - h) > 5) {
                    lastHeight = h;
                    window.parent.postMessage({ type: 'resize', height: h }, '*');
                }
            }
        };
        window.addEventListener('load', sendHeight);
        
        // 100ms遅延させて安定したあとに監視開始
        setTimeout(() => {
            const target = document.querySelector('.container');
            if(target) {
                new ResizeObserver(sendHeight).observe(target);
                const observer = new MutationObserver(sendHeight);
                observer.observe(target, { childList: true, subtree: true, characterData: true });
            }
        }, 100);
    </script>
</body>
</html>
