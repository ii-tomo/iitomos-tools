<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iitomo's Tools</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' style='stop-color:%23FF4500'/><stop offset='100%' style='stop-color:%23FF8C00'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text y='.75em' x='5' font-size='70' fill='white' font-family='Arial'>ii</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-decor blob-1"></div>
    <div class="background-decor blob-2"></div>
    <div class="background-decor blob-3"></div>

    <div class="container">
        <header>
            <div id="line-browser-banner" class="line-banner" style="display: none;">
                <p><i class="fa-brands fa-line"></i> LINE内蔵ブラウザでは一部機能が制限されます。</p>
                <button id="open-external-btn">外部ブラウザで開く</button>
            </div>
            <h1>iitomo's <span class="gradient-text">Tools</span></h1>
            <p class="subtitle">あなただけのクリエイティブ・アプリポータル</p>
        </header>

        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" placeholder="ツールを検索... (例: QR, 画像)">
        </div>

        <main class="app-grid" id="appGrid">
            <!-- App Card 1: QR Generator -->
            <a href="qr/index.html" class="app-card" data-title="QRコード生成ツール URL短縮">
                <div class="card-icon gradient-1">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
                <div class="card-content">
                    <h3>QR Code Generator</h3>
                    <p>URLから一瞬でQRコードを生成。便利な短縮URL機能も搭載しています。</p>
                </div>
                <div class="card-hover-effect"></div>
            </a>

            <!-- App Card 2: Translator -->
            <a href="translator/index.html" class="app-card" data-title="翻訳ツール 日本語 英語">
                <div class="card-icon gradient-2">
                    <i class="fa-solid fa-language"></i>
                </div>
                <div class="card-content">
                    <h3>Translator</h3>
                    <p>日本語と英語をスムーズに翻訳。プレミアムな質感で快適に利用できます。</p>
                </div>
                <div class="card-hover-effect"></div>
            </a>
        </main>

        <footer>
            <p>&copy; 2026 iitomo's Workspace. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
